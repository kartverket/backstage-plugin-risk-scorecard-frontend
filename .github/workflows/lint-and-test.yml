name: Lint, test and compile plugin

on:
  pull_request:
    paths-ignore:
      - '.security/**'

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile_and_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x' # From mise.toml
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build native test dependency
        # Yarn 4 defaults to enableScripts=false. Backend database tests use
        # better-sqlite3 via @backstage/backend-test-utils, so build that
        # known native dependency explicitly instead of enabling all scripts.
        run: npm --prefix node_modules/better-sqlite3 run install --silent

      - name: Run Prettier
        run: yarn prettier:check

      - name: Run lint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Run tsc
        run: yarn typecheck
